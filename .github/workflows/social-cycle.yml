name: Social Cycle (Every 6h)
on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

jobs:
  social:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install
      - name: Run Social Agent
        run: npx ts-node src/agents/social-agent.ts
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIST_STATE_ID: ${{ secrets.GIST_STATE_ID }}
          GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS }}
          NVIDIA_API_KEYS: ${{ secrets.NVIDIA_API_KEYS }}
          OPENROUTER_API_KEYS: ${{ secrets.OPENROUTER_API_KEYS }}
