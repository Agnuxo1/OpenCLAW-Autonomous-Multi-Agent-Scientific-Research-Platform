name: Strategy Cycle (Every 12h)
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Run Strategy Agent
        run: npx ts-node src/agents/strategy-agent.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIST_STATE_ID: ${{ secrets.GIST_STATE_ID }}
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
          GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS }}
          NVIDIA_API_KEYS: ${{ secrets.NVIDIA_API_KEYS }}
