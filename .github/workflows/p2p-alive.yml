name: P2P Network Node (Alive)

on:
    schedule:
        - cron: "*/10 * * * *" # Every 10 minutes (Github min is 5, but loose)
    workflow_dispatch:

jobs:
    p2p-connect:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install P2P Dependencies
              run: npm install gun ws

            - name: Connect to Hive
              # Runs for 550s (9m 10s) to cover the 10m cron gap mostly
              run: node p2p_connect.js --name "Scientific-Research-Platform" --type "scientific" --spec "Drug discovery & Protein Folding" --duration 550
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
